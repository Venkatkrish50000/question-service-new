  name: Docker -> Build-> Push-> Deploy

  on:
    push:
      branches: [ "main" ]


  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v4
        #run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)

      #- name: SetUp Java
      #  uses: actions/checkout@v4

      - name: SetUp Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'    #See 'Supported distributions' for available options..
          java-version: '21'

      - name: Build Jar
        run: |
         chmod +x ./mvnw
         ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/question-service-new:latest .

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/question-service-new:latest

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           docker stop question-service-demo || true
           docker rm question-service-demo || true
           docker pull ${{ secrets.DOCKERHUB_USERNAME }}/question-service-new:latest
           docker run -d --name question-service-demo -p 8080:8080 ${{secrets.DOCKERHUB_USERNAME }}/question-service-new:latest
